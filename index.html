<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fermer+ Support</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f7fafc;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      max-width: 420px;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 1.2rem;
      color: #0f172a;
    }

    .desc {
      margin-bottom: 1.6rem;
      line-height: 1.6;
      color: #334155;
    }

    .contact {
      font-size: 1.25rem;
      margin-bottom: 1rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.2rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      color: white;
      background: #25d366;
      box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(37, 211, 102, 0.35);
    }

    .button:active {
      transform: translateY(0);
      box-shadow: 0 8px 16px rgba(37, 211, 102, 0.25);
    }

    .note {
      margin-top: 1.25rem;
      font-size: 0.9rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">fermer+ Support</div>
    <p class="desc">Need help with fermer+? Reach out to our support team directly using the phone or WhatsApp link below.</p>

    <div class="contact">
      <strong>Phone:</strong> <a href="tel:+77064078385">+7 706 407 83 85</a>
    </div>

    <a
      class="button"
      href="https://wa.me/77064078385"
      target="_blank"
      rel="noopener noreferrer"
    >
      <!-- WhatsApp icon (SVG) -->
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20.52 3.48C18.2 1.16 15.13 0 12 0 5.38 0 0 5.38 0 12c0 2.12.55 4.19 1.59 6.01L0 24l6.23-1.61c1.77 1 3.75 1.53 5.77 1.53 6.62 0 12-5.38 12-12 0-3.13-1.16-6.2-3.48-8.52z" fill="#25D366"/>
        <path d="M17.16 14.12c-.3-.15-1.78-.88-2.06-.98-.28-.1-.48-.15-.68.15-.2.3-.78.98-.96 1.18-.18.2-.36.22-.66.07-.3-.15-1.27-.47-2.42-1.49-.9-.8-1.5-1.8-1.67-2.1-.17-.3-.02-.46.13-.61.14-.14.3-.35.45-.53.15-.18.2-.3.3-.5.1-.2.05-.38-.02-.53-.07-.15-.68-1.65-.93-2.25-.24-.58-.49-.5-.68-.5-.18 0-.4-.02-.61-.02-.2 0-.53.07-.8.38-.28.3-1.07 1.05-1.07 2.55 0 1.5 1.1 2.95 1.25 3.15.15.2 2.15 3.3 5.24 4.63.73.31 1.3.5 1.75.64.74.24 1.41.2 1.94.12.59-.09 1.78-.72 2.03-1.41.25-.69.25-1.28.18-1.41-.07-.14-.27-.2-.57-.35z" fill="#fff"/>
      </svg>
      Chat on WhatsApp
    </a>

    <p class="note">Clicking the WhatsApp button will open WhatsApp (web or app) with the number pre-filled.</p>
  </main>
</body>
</html>
